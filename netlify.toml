# ── CRITICAL: Catch-all returns 404 for unknown routes ──
# All valid pages are pre-rendered as /path/index.html — Netlify auto-serves them.
# Any route that doesn't match a pre-rendered file gets a real 404 response.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

