[build]
  command = "corepack enable && pnpm install && pnpm run build"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "22"
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "false"

# Disable pretty URLs to prevent trailing slash additions
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = false

# Force no trailing slash (301 redirect /path/ → /path)
[[redirects]]
  from = "/about/"
  to = "/about"
  status = 301
  force = true

[[redirects]]
  from = "/team/"
  to = "/team"
  status = 301
  force = true

[[redirects]]
  from = "/services/"
  to = "/services"
  status = 301
  force = true

[[redirects]]
  from = "/blog/"
  to = "/blog"
  status = 301
  force = true

[[redirects]]
  from = "/contact/"
  to = "/contact"
  status = 301
  force = true

[[redirects]]
  from = "/faq/"
  to = "/faq"
  status = 301
  force = true

[[redirects]]
  from = "/careers/"
  to = "/careers"
  status = 301
  force = true

[[redirects]]
  from = "/privacy/"
  to = "/privacy"
  status = 301
  force = true

[[redirects]]
  from = "/terms/"
  to = "/terms"
  status = 301
  force = true

[[redirects]]
  from = "/cases-guide/"
  to = "/cases-guide"
  status = 301
  force = true

[[redirects]]
  from = "/sitemap/"
  to = "/sitemap"
  status = 301
  force = true

[[redirects]]
  from = "/bankruptcy/"
  to = "/bankruptcy"
  status = 301
  force = true

# SPA fallback: serve pre-rendered HTML or index.html for client routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Noindex for 404 page
[[headers]]
  for = "/404.html"
  [headers.values]
    X-Robots-Tag = "noindex"
