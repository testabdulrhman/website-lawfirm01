# ── English routes: serve index.html for SPA routing ──
[[redirects]]
  from = "/en"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/en/*"
  to = "/index.html"
  status = 200

# SPA fallback: serve pre-rendered HTML or index.html for client routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Noindex for 404 page
[[headers]]
  for = "/404.html"
  [headers.values]
    X-Robots-Tag = "noindex"
