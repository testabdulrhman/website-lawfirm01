[build]
  command = "corepack enable && pnpm install && pnpm run build"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "22"

# Disable pretty URLs to prevent trailing slash additions
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = false

# ── Security Headers (all pages) ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://wa.me https://www.google.com"

# ── Old WordPress pages: 301 redirect to closest match ──
