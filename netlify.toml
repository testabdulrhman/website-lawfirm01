# ── Pre-rendered pages: serve their own index.html (Netlify auto-resolves /path → /path/index.html) ──
# No explicit rules needed — Netlify serves /bankruptcy/index.html for /bankruptcy automatically

# ── English routes: serve index.html for SPA routing ──
[[redirects]]
  from = "/en"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/en/*"
  to = "/index.html"
  status = 200

# ── SPA fallback for known Arabic routes (pre-rendered pages have their own index.html) ──
# Netlify auto-serves /path/index.html for /path when the file exists.
# For routes without pre-rendered files, fallback to index.html (200) for SPA hydration.
# The NotFound component handles noindex client-side for unknown routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Noindex headers for utility pages ──
[[headers]]
  for = "/404.html"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
